name: AI Blog Automation

on:
  schedule:
    # 6 tweets per day at EAT peak hours (UTC times):
    # 05:00 UTC = 08:00 EAT  (morning peak)
    # 07:00 UTC = 10:00 EAT  (mid-morning)
    # 09:00 UTC = 12:00 EAT  (lunch)
    # 12:00 UTC = 15:00 EAT  (afternoon)
    # 15:00 UTC = 18:00 EAT  (evening commute)
    # 18:00 UTC = 21:00 EAT  (night peak)
    - cron: "0 5 * * *"
    - cron: "0 7 * * *"
    - cron: "0 9 * * *"
    - cron: "0 12 * * *"
    - cron: "0 15 * * *"
    - cron: "0 18 * * *"
  workflow_dispatch:
    inputs:
      force_cleanup:
        description: "Force cleanup of posts"
        required: false
        default: false
        type: boolean
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pull latest changes
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git pull origin main --rebase

      - name: Verify secrets
        run: |
          for VAR in GROQ_API_KEY GEMINI_API_KEY OPENROUTER_API_KEY \
                     CEREBRAS_API_KEY MISTRAL_API_KEY NVIDIA_API_KEY \
                     TWITTER_API_KEY TWITTER_API_SECRET \
                     TWITTER_ACCESS_TOKEN TWITTER_ACCESS_TOKEN_SECRET \
                     TWITTER_BEARER_TOKEN BLOGGITHUB_TOKEN CLOUDFLARE_ACCOUNT_ID CLOUDFLARE_API_TOKEN ENABLE_TWITTER_POSTING; do
            if [ -z "${!VAR}" ]; then
              echo "WARNING: $VAR is not set"
            else
              echo "OK: $VAR is set"
            fi
          done
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          BLOGGITHUB_TOKEN: ${{ secrets.BLOGGITHUB_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ENABLE_TWITTER_POSTING: ${{ secrets.ENABLE_TWITTER_POSTING }}

      # ── Resolve the effective Twitter posting flag ──────────────────────
      # schedule  → ALWAYS post
      # push      → NEVER post (code changes must not burn a tweet)
      # dispatch  → respect ENABLE_TWITTER_POSTING secret
      - name: Resolve Twitter posting flag
        id: twitter_flag
        run: |
          EVENT="${{ github.event_name }}"
          SECRET_FLAG="${{ secrets.ENABLE_TWITTER_POSTING }}"

          if [ "$EVENT" = "schedule" ]; then
            echo "Trigger: scheduled cron — Twitter posting FORCED ON"
            echo "effective_flag=true" >> $GITHUB_OUTPUT
          elif [ "$EVENT" = "push" ]; then
            echo "Trigger: push — Twitter posting FORCED OFF"
            echo "effective_flag=false" >> $GITHUB_OUTPUT
          else
            NORMALISED=$(echo "$SECRET_FLAG" | tr '[:upper:]' '[:lower:]' | xargs)
            if [ "$NORMALISED" = "true" ]; then
              echo "Trigger: $EVENT — ENABLE_TWITTER_POSTING=true → posting ON"
              echo "effective_flag=true" >> $GITHUB_OUTPUT
            else
              echo "Trigger: $EVENT — ENABLE_TWITTER_POSTING=${SECRET_FLAG:-<not set>} → posting OFF"
              echo "effective_flag=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Initialize config if needed
        run: |
          [ -f "config.yaml" ] && echo "Config exists" || python blog_system.py init

      - name: Conditional cleanup
        if: >
          github.event.inputs.force_cleanup == 'true' ||
          (github.event_name == 'schedule' &&
           startsWith(github.event.schedule, '0 0 '))
        run: python blog_system.py cleanup

      - name: Restore trending hashtag cache
        run: |
          git checkout origin/main -- .trending_hashtag_cache.json 2>/dev/null || true

      - name: Generate new blog content
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          BLOGGITHUB_TOKEN: ${{ secrets.BLOGGITHUB_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ENABLE_TWITTER_POSTING: ${{ steps.twitter_flag.outputs.effective_flag }}
        run: |
          python blog_system.py auto || {
            echo "WARNING: Content generation failed — rebuilding existing content"
            python blog_system.py build
          }

      - name: Verify generated content
        run: |
          post_count=$(find docs -name "post.json" 2>/dev/null | wc -l)
          echo "Total posts: $post_count"
          [ -f "docs/index.html" ] || { echo "ERROR: no index.html"; exit 1; }

      - name: Commit changes
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            post_count=$(find docs -name "post.json" | wc -l)
            git commit -m "Auto-blog $(date '+%Y-%m-%d %H:%M') — ${post_count} posts"
            git push origin main
          fi

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Summary
        run: |
          post_count=$(find docs -name "post.json" | wc -l)
          {
            echo "## Deployment Complete"
            echo "**URL**: ${{ steps.deployment.outputs.page_url }}"
            echo "**Posts**: $post_count"
            echo "**Trigger**: ${{ github.event_name }}"
            echo "**Twitter posting**: ${{ steps.twitter_flag.outputs.effective_flag }}"
            echo "**Run**: #${{ github.run_number }} — $(date -u '+%Y-%m-%d %H:%M UTC')"
          } >> $GITHUB_STEP_SUMMARY
