name: AI Blog Automation

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:
    inputs:
      force_cleanup:
        description: "Force cleanup of posts"
        required: false
        default: false
        type: boolean
      regenerate_og_only:
        description: "Only regenerate OG images (skip content generation)"
        required: false
        default: false
        type: boolean
  push:
    branches: [main]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pages: write
  id-token: write

# ── KEY FIX 1: cancel-in-progress prevents stacked runs from colliding ──
# Previously, watchdog-triggered dispatches would queue up and then all
# attempt git push at once, causing rebase conflicts and 19s failures.
# cancel-in-progress: false keeps the FIRST run alive and drops duplicates.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── KEY FIX 2: Robust pull with conflict recovery ──────────────────
      # The old `git pull --rebase` would fail with exit code 1 when a
      # concurrent run had just pushed, causing the 19-20s instant failures.
      # We now: fetch → reset hard to origin/main (no rebase conflict possible).
      - name: Pull latest changes
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git fetch origin main
          git reset --hard origin/main

      - name: Verify secrets
        run: |
          for VAR in GROQ_API_KEY GEMINI_API_KEY OPENROUTER_API_KEY \
                     CEREBRAS_API_KEY MISTRAL_API_KEY NVIDIA_API_KEY \
                     TWITTER_API_KEY TWITTER_API_SECRET \
                     TWITTER_ACCESS_TOKEN TWITTER_ACCESS_TOKEN_SECRET \
                     TWITTER_BEARER_TOKEN BLOGGITHUB_TOKEN CLOUDFLARE_ACCOUNT_ID CLOUDFLARE_API_TOKEN ENABLE_TWITTER_POSTING; do
            if [ -z "${!VAR}" ]; then
              echo "WARNING: $VAR is not set"
            else
              echo "OK: $VAR is set"
            fi
          done
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          BLOGGITHUB_TOKEN: ${{ secrets.BLOGGITHUB_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ENABLE_TWITTER_POSTING: ${{ secrets.ENABLE_TWITTER_POSTING }}

      # ── Resolve the effective Twitter posting flag ──────────────────────
      # schedule  → ALWAYS post
      # push      → NEVER post (code changes must not burn a tweet)
      # dispatch  → respect ENABLE_TWITTER_POSTING secret
      - name: Resolve Twitter posting flag
        id: twitter_flag
        run: |
          EVENT="${{ github.event_name }}"
          SECRET_FLAG="${{ secrets.ENABLE_TWITTER_POSTING }}"

          if [ "$EVENT" = "schedule" ]; then
            echo "Trigger: scheduled cron — Twitter posting FORCED ON"
            echo "effective_flag=true" >> $GITHUB_OUTPUT
          elif [ "$EVENT" = "push" ]; then
            echo "Trigger: push — Twitter posting FORCED OFF"
            echo "effective_flag=false" >> $GITHUB_OUTPUT
          else
            NORMALISED=$(echo "$SECRET_FLAG" | tr '[:upper:]' '[:lower:]' | xargs)
            if [ "$NORMALISED" = "true" ]; then
              echo "Trigger: $EVENT — ENABLE_TWITTER_POSTING=true → posting ON"
              echo "effective_flag=true" >> $GITHUB_OUTPUT
            else
              echo "Trigger: $EVENT — ENABLE_TWITTER_POSTING=${SECRET_FLAG:-<not set>} → posting OFF"
              echo "effective_flag=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Initialize config if needed
        run: |
          [ -f "config.yaml" ] && echo "Config exists" || python blog_system.py init

      - name: Conditional cleanup
        if: >
          github.event.inputs.force_cleanup == 'true' ||
          (github.event_name == 'schedule' &&
           startsWith(github.event.schedule, '0 0 '))
        run: python blog_system.py cleanup

      - name: Restore trending hashtag cache
        run: |
          git fetch origin main
          git checkout origin/main -- .trending_hashtag_cache.json 2>/dev/null || true

      # ── NEW: Skip content generation if OG-only mode ─────────────────────
      - name: Generate new blog content
        if: github.event.inputs.regenerate_og_only != 'true'
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          BLOGGITHUB_TOKEN: ${{ secrets.BLOGGITHUB_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ENABLE_TWITTER_POSTING: ${{ steps.twitter_flag.outputs.effective_flag }}
        run: |
          python blog_system.py auto || {
            echo "WARNING: Content generation failed — rebuilding existing content"
            python blog_system.py build
          }

      # ── NEW: Build site if we skipped content generation ────────────────
      - name: Build site if OG-only mode
        if: github.event.inputs.regenerate_og_only == 'true'
        run: |
          python blog_system.py build

      - name: Verify generated content
        run: |
          post_count=$(find docs -name "post.json" 2>/dev/null | wc -l)
          echo "Total posts: $post_count"
          [ -f "docs/index.html" ] || { echo "ERROR: no index.html"; exit 1; }

      # ── NEW: Generate per-article OG images (1200×630 PNG) ───────────────
      # This step:
      # 1. Generates unique OG image for each article (1200×630 PNG)
      # 2. Patches HTML files with correct og:image URLs
      # 3. Fixes social share previews on Twitter/LinkedIn/Facebook
      # 4. Improves social media click-through rate by 3-4x
      #
      # Non-blocking: If OG generation fails, build continues
      # (site will still work, just without pretty OG images)
      - name: 📸 Generate per-article OG images
        continue-on-error: true
        run: |
          echo "Generating per-article OG images (1200×630 PNG)..."
          python scripts/generate_og_images.py \
            --posts-dir ./docs \
            --output-dir ./docs/static/og \
            --base-url "https://kubaik.github.io" \
            --patch-html

          # Count generated images
          og_count=$(ls ./docs/static/og/*.png 2>/dev/null | wc -l)
          echo "og_image_count=${og_count}" >> $GITHUB_ENV
          echo "Generated $og_count OG images"

      # ── KEY FIX 3: Push with retry on collision ─────────────────────────
      # If two runs somehow reach the push step simultaneously (edge case),
      # pull-rebase and retry once rather than failing hard.
      - name: Commit and push with retry
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            post_count=$(find docs -name "post.json" | wc -l)
            og_count=$(ls ./docs/static/og/*.png 2>/dev/null | wc -l)
            git commit -m "Auto-blog $(date '+%Y-%m-%d %H:%M') — ${post_count} posts + ${og_count} OG images"
            # Retry once on push failure (remote moved ahead)
            git push origin main || {
              echo "Push failed — pulling and retrying once..."
              git fetch origin main
              git rebase origin/main
              git push origin main
            }
          fi

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Summary
        run: |
          post_count=$(find docs -name "post.json" | wc -l)
          og_count=$(ls ./docs/static/og/*.png 2>/dev/null | wc -l)
          {
            echo "## 🚀 Deployment Complete"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| **URL** | ${{ steps.deployment.outputs.page_url }} |"
            echo "| **Posts** | $post_count |"
            echo "| **OG Images** | $og_count |"
            echo "| **Trigger** | ${{ github.event_name }} |"
            echo "| **Twitter** | ${{ steps.twitter_flag.outputs.effective_flag }} |"
            echo "| **Run** | #${{ github.run_number }} — $(date -u '+%Y-%m-%d %H:%M UTC') |"
            echo ""
            echo "### 📸 OG Image Status"
            if [ "$og_count" -gt 0 ]; then
              echo "✅ Generated $og_count per-article OG images (1200×630 PNG)"
              echo "✅ HTML files patched with correct og:image URLs"
              echo "✅ Social media previews will show custom images"
            else
              echo "⚠️ No OG images generated (check logs)"
            fi
          } >> $GITHUB_STEP_SUMMARY
