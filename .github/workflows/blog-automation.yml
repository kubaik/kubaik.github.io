name: AI Blog Automation

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:
    inputs:
      force_cleanup:
        description: "Force cleanup of posts"
        required: false
        default: false
        type: boolean
      regenerate_og_only:
        description: "Only regenerate OG images (skip content generation)"
        required: false
        default: false
        type: boolean
      skip_interval_check:
        description: "Bypass the 2-hour minimum-interval check"
        required: false
        default: false
        type: boolean
  push:
    branches: [main]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ── Gate job — stops the whole workflow if the last successful
  # run happened less than CRON_TIME seconds ago, regardless of trigger type.
  #
  # Required GitHub secret:
  #   CRON_TIME — number of seconds to wait between runs (e.g. "7200" for
  #               2 hours, or "300" for 5 minutes via 5 * 60).
  #               Should match the cron schedule above ("0 */2 * * *" -> 7200).
  #               Falls back to 7200 (2h) if unset or not a valid integer.
  # ──────────────────────────────────────────────────────────────────
  check-interval:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      proceed: ${{ steps.gate.outputs.proceed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check time since last run
        id: gate
        env:
          CRON_TIME: ${{ secrets.CRON_TIME }}
        run: |
          # Bypass switch for manual runs that need to force it
          if [ "${{ github.event.inputs.skip_interval_check }}" = "true" ]; then
            echo "Manual override: skip_interval_check=true — proceeding"
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LAST_TS=$(git log -1 --grep="^Auto-blog" --format=%ct main 2>/dev/null || true)

          if [ -z "$LAST_TS" ]; then
            echo "No prior Auto-blog commit found — proceeding"
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Interval length comes directly from the CRON_TIME secret, in seconds
          # (e.g. 5 * 60 = 300 for 5 minutes, 2 * 3600 = 7200 for 2 hours).
          # Falls back to 7200s (2h) if unset or not a valid whole number.
          INTERVAL_SECONDS="${CRON_TIME:-7200}"
          if ! [[ "$INTERVAL_SECONDS" =~ ^[0-9]+$ ]]; then
            echo "⚠️ CRON_TIME secret ('$CRON_TIME') is not a valid integer — defaulting to 7200s (2h)"
            INTERVAL_SECONDS=7200
          fi

          NOW_TS=$(date +%s)
          DIFF=$(( NOW_TS - LAST_TS ))

          echo "Interval threshold: ${INTERVAL_SECONDS}s, from CRON_TIME secret"
          echo "Last Auto-blog commit: $(date -u -d "@$LAST_TS" '+%Y-%m-%d %H:%M UTC')"
          echo "Now:                   $(date -u -d "@$NOW_TS" '+%Y-%m-%d %H:%M UTC')"
          echo "Elapsed: ${DIFF}s (need >= ${INTERVAL_SECONDS}s)"

          if [ "$DIFF" -ge "$INTERVAL_SECONDS" ]; then
            echo "✅ Interval elapsed — proceeding"
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          else
            REMAINING=$(( INTERVAL_SECONDS - DIFF ))
            echo "⏭️ Only ${DIFF}s since last run (${REMAINING}s remaining) — skipping this run"
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          fi

  generate-and-deploy:
    needs: check-interval
    if: needs.check-interval.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pull latest changes
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git fetch origin main
          git reset --hard origin/main

      - name: Verify secrets
        run: |
          for VAR in GROQ_API_KEY GEMINI_API_KEY OPENROUTER_API_KEY \
                     CEREBRAS_API_KEY MISTRAL_API_KEY NVIDIA_API_KEY \
                     TWITTER_API_KEY TWITTER_API_SECRET \
                     TWITTER_ACCESS_TOKEN TWITTER_ACCESS_TOKEN_SECRET \
                     TWITTER_BEARER_TOKEN BLOGGITHUB_TOKEN CLOUDFLARE_ACCOUNT_ID CLOUDFLARE_API_TOKEN ENABLE_TWITTER_POSTING \
                     CRON_TIME; do
            if [ -z "${!VAR}" ]; then
              echo "WARNING: $VAR is not set"
            else
              echo "OK: $VAR is set"
            fi
          done
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          BLOGGITHUB_TOKEN: ${{ secrets.BLOGGITHUB_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ENABLE_TWITTER_POSTING: ${{ secrets.ENABLE_TWITTER_POSTING }}
          # CRON_TIME: number of seconds the check-interval job requires between
          # runs before it lets generate-and-deploy proceed. Should match the
          # cron schedule above (currently "0 */2 * * *" -> set CRON_TIME = 7200).
          CRON_TIME: ${{ secrets.CRON_TIME }}

      - name: Resolve Twitter posting flag
        id: twitter_flag
        run: |
          EVENT="${{ github.event_name }}"
          SECRET_FLAG="${{ secrets.ENABLE_TWITTER_POSTING }}"

          if [ "$EVENT" = "schedule" ]; then
            echo "Trigger: scheduled cron — Twitter posting FORCED ON"
            echo "effective_flag=true" >> $GITHUB_OUTPUT
          elif [ "$EVENT" = "push" ]; then
            echo "Trigger: push — Twitter posting FORCED OFF"
            echo "effective_flag=false" >> $GITHUB_OUTPUT
          else
            NORMALISED=$(echo "$SECRET_FLAG" | tr '[:upper:]' '[:lower:]' | xargs)
            if [ "$NORMALISED" = "true" ]; then
              echo "Trigger: $EVENT — ENABLE_TWITTER_POSTING=true → posting ON"
              echo "effective_flag=true" >> $GITHUB_OUTPUT
            else
              echo "Trigger: $EVENT — ENABLE_TWITTER_POSTING=${SECRET_FLAG:-<not set>} → posting OFF"
              echo "effective_flag=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Initialize config if needed
        run: |
          [ -f "config.yaml" ] && echo "Config exists" || python blog_system.py init

      - name: Conditional cleanup
        if: >
          github.event.inputs.force_cleanup == 'true' ||
          (github.event_name == 'schedule' &&
           startsWith(github.event.schedule, '0 0 '))
        run: python blog_system.py cleanup

      - name: Restore trending hashtag cache
        run: |
          git fetch origin main
          git checkout origin/main -- .trending_hashtag_cache.json 2>/dev/null || true

      - name: Generate new blog content
        if: github.event.inputs.regenerate_og_only != 'true'
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          BLOGGITHUB_TOKEN: ${{ secrets.BLOGGITHUB_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ENABLE_TWITTER_POSTING: ${{ steps.twitter_flag.outputs.effective_flag }}
        run: |
          python blog_system.py auto || {
            echo "WARNING: Content generation failed — rebuilding existing content"
            python blog_system.py build
          }

      - name: Build site if OG-only mode
        if: github.event.inputs.regenerate_og_only == 'true'
        run: |
          python blog_system.py build

      - name: Verify generated content
        run: |
          post_count=$(find docs -name "post.json" 2>/dev/null | wc -l)
          echo "Total posts: $post_count"
          [ -f "docs/index.html" ] || { echo "ERROR: no index.html"; exit 1; }

      # ── NEW: Generate sitemap.xml so search engines can discover posts ──
      # Runs after content generation/build (both the normal and OG-only
      # paths funnel through "Verify generated content" above), so it always
      # sees the final set of published HTML pages for this run before we
      # touch OG images, commit, or deploy. Non-blocking on individual page
      # parse issues; the script itself skips excluded/draft paths.
      - name: 🗺️ Generate sitemap.xml
        run: |
          python scripts/generate_sitemap.py \
            --output-dir ./docs \
            --base-url "https://kubaik.github.io" \
            --chunk-size 1000

          if [ -f ./docs/sitemap.xml ]; then
            if grep -q "sitemapindex" ./docs/sitemap.xml; then
              # sitemap.xml is an index (post count exceeded --chunk-size);
              # count total URLs across the sub-sitemaps it points to.
              url_count=$(cat ./docs/sitemap-*.xml 2>/dev/null | grep -o "<loc>" | wc -l)
              sitemap_count=$(grep -o "<sitemap>" ./docs/sitemap.xml | wc -l)
              echo "sitemap_url_count=${url_count}" >> $GITHUB_ENV
              echo "✅ sitemap index generated: ${sitemap_count} sub-sitemaps, ${url_count} total URLs"
            else
              url_count=$(grep -o "<loc>" ./docs/sitemap.xml | wc -l)
              echo "sitemap_url_count=${url_count}" >> $GITHUB_ENV
              echo "✅ sitemap.xml generated with ${url_count} entries"
            fi
          else
            echo "⚠️ WARNING: sitemap.xml was not created"
            echo "sitemap_url_count=0" >> $GITHUB_ENV
          fi

      - name: 📸 Generate per-article OG images
        continue-on-error: true
        run: |
          echo "Generating per-article OG images (1200×630 PNG)..."
          python scripts/generate_og_images.py \
            --posts-dir ./docs \
            --output-dir ./docs/static/og \
            --base-url "https://kubaik.github.io" \
            --patch-html

          og_count=$(ls ./docs/static/og/*.png 2>/dev/null | wc -l)
          echo "og_image_count=${og_count}" >> $GITHUB_ENV
          echo "Generated $og_count OG images"

      - name: Commit and push with retry
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            post_count=$(find docs -name "post.json" | wc -l)
            og_count=$(ls ./docs/static/og/*.png 2>/dev/null | wc -l)
            git commit -m "Auto-blog $(date '+%Y-%m-%d %H:%M') — ${post_count} posts + ${og_count} OG images + sitemap"
            git push origin main || {
              echo "Push failed — pulling and retrying once..."
              git fetch origin main
              git rebase origin/main
              git push origin main
            }
          fi

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Summary
        run: |
          post_count=$(find docs -name "post.json" | wc -l)
          og_count=$(ls ./docs/static/og/*.png 2>/dev/null | wc -l)
          {
            echo "## 🚀 Deployment Complete"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| **URL** | ${{ steps.deployment.outputs.page_url }} |"
            echo "| **Posts** | $post_count |"
            echo "| **Sitemap URLs** | ${{ env.sitemap_url_count }} |"
            echo "| **OG Images** | $og_count |"
            echo "| **Trigger** | ${{ github.event_name }} |"
            echo "| **Twitter** | ${{ steps.twitter_flag.outputs.effective_flag }} |"
            echo "| **Run** | #${{ github.run_number }} — $(date -u '+%Y-%m-%d %H:%M UTC') |"
            echo ""
            echo "### 🗺️ Sitemap Status"
            if [ "${{ env.sitemap_url_count }}" -gt 0 ]; then
              echo "✅ sitemap.xml is live at ${{ steps.deployment.outputs.page_url }}sitemap.xml"
            else
              echo "⚠️ sitemap.xml was not generated — check the sitemap step logs"
            fi
            echo ""
            echo "### 📸 OG Image Status"
            if [ "$og_count" -gt 0 ]; then
              echo "✅ Generated $og_count per-article OG images (1200×630 PNG)"
              echo "✅ HTML files patched with correct og:image URLs"
              echo "✅ Social media previews will show custom images"
            else
              echo "⚠️ No OG images generated (check logs)"
            fi
          } >> $GITHUB_STEP_SUMMARY
