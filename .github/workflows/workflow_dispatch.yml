name: Watchdog - Blog Automation Monitor

on:
  schedule:
    - cron: "15 * * * *" # Runs 15 minutes past every hour
    - cron: "30 * * * *" # Runs 30 minutes past every hour
    - cron: "45 * * * *" # Runs 45 minutes past every hour
  workflow_dispatch: # Allows manual execution for testing

permissions:
  contents: read
  actions: write

concurrency:
  group: watchdog-blog-automation
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  WORKFLOW_FILE: blog-automation.yml
  WORKFLOW_REF: main
  STALE_THRESHOLD_MINUTES: 40
  HUNG_THRESHOLD_MINUTES: 25

jobs:
  check-and-retrigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check last blog automation run
        id: check_run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Fetching last run info for ${WORKFLOW_FILE}..."

          LAST_RUN_JSON=$(gh run list \
            --repo "${{ github.repository }}" \
            --workflow="${WORKFLOW_FILE}" \
            --limit=1 \
            --json updatedAt,status,conclusion,databaseId)

          echo "Last run data: $LAST_RUN_JSON"

          python3 << 'EOF' >> "$GITHUB_OUTPUT"
import json
import sys

data = json.loads("""$LAST_RUN_JSON""")

if not data:
    print("last_updated=")
    print("last_status=unknown")
    print("last_conclusion=unknown")
    print("last_run_id=")
else:
    run = data[0]
    print(f"last_updated={run.get('updatedAt', '')}")
    print(f"last_status={run.get('status', 'unknown')}")
    print(f"last_conclusion={run.get('conclusion', 'unknown')}")
    print(f"last_run_id={run.get('databaseId', '')}")
EOF

          echo "Last updated   : ${{ steps.check_run.outputs.last_updated }}"
          echo "Last status    : ${{ steps.check_run.outputs.last_status }}"
          echo "Last conclusion: ${{ steps.check_run.outputs.last_conclusion }}"
          echo "Last run ID    : ${{ steps.check_run.outputs.last_run_id }}"

      - name: Calculate staleness
        id: staleness
        run: |
          LAST_UPDATED="${{ steps.check_run.outputs.last_updated }}"
          LAST_STATUS="${{ steps.check_run.outputs.last_status }}"

          if [[ -z "$LAST_UPDATED" ]]; then
            echo "No previous runs found. Marking as stale."
            echo "is_stale=true" >> "$GITHUB_OUTPUT"
            echo "age_minutes=-1" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          NOW=$(date -u +%s)
          LAST=$(date -u -d "$LAST_UPDATED" +%s)
          DIFF=$(( (NOW - LAST) / 60 ))

          echo "Last run was $DIFF minutes ago (status: $LAST_STATUS)"
          echo "age_minutes=$DIFF" >> "$GITHUB_OUTPUT"

          IS_STALE="false"

          if (( DIFF > STALE_THRESHOLD_MINUTES )); then
            echo "STALE: Last run is older than ${STALE_THRESHOLD_MINUTES} minutes."
            IS_STALE="true"
          elif [[ "$LAST_STATUS" == "in_progress" || "$LAST_STATUS" == "queued" ]] \
               && (( DIFF > HUNG_THRESHOLD_MINUTES )); then
            echo "STALE: Run has been $LAST_STATUS for $DIFF minutes — likely hung."
            IS_STALE="true"
          else
            echo "OK: Run is recent enough."
          fi

          echo "is_stale=$IS_STALE" >> "$GITHUB_OUTPUT"

      - name: Cancel hung run if needed
        if: |
          steps.staleness.outputs.is_stale == 'true' &&
          (steps.check_run.outputs.last_status == 'in_progress' ||
           steps.check_run.outputs.last_status == 'queued') &&
          steps.check_run.outputs.last_run_id != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID="${{ steps.check_run.outputs.last_run_id }}"
          echo "Cancelling hung run ID: $RUN_ID"
          gh run cancel "$RUN_ID" --repo "${{ github.repository }}" \
            || echo "Cancel failed or run already completed."

          echo "Waiting for cancellation to process..."
          sleep 10

      - name: Re-trigger blog automation
        if: steps.staleness.outputs.is_stale == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Triggering ${WORKFLOW_FILE}..."

          gh workflow run "${WORKFLOW_FILE}" \
            --repo "${{ github.repository }}" \
            --ref "${WORKFLOW_REF}" \
          || {
            echo "Retrying trigger..."
            sleep 5
            gh workflow run "${WORKFLOW_FILE}" \
              --repo "${{ github.repository }}" \
              --ref "${WORKFLOW_REF}"
          }

          echo "SUCCESS: ${WORKFLOW_FILE} has been triggered."

      - name: Watchdog Summary
        if: always()
        run: |
          echo "## Watchdog Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Last Run Status | ${{ steps.check_run.outputs.last_status }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Last Conclusion | ${{ steps.check_run.outputs.last_conclusion }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Age (minutes) | ${{ steps.staleness.outputs.age_minutes }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Was Stale | ${{ steps.staleness.outputs.is_stale }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Checked At | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [[ "${{ steps.staleness.outputs.is_stale }}" == "true" ]]; then
            echo "⚠️ **Action Taken**: Blog automation was stale and has been re-triggered." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "✅ **No Action Needed**: Blog automation is running on schedule." >> "$GITHUB_STEP_SUMMARY"
          fi