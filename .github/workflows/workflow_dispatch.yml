name: Watchdog - Blog Automation Monitor

on:
  schedule:
    - cron: "15 * * * *"
    - cron: "45 * * * *"
  workflow_dispatch: # Allow manual trigger for testing

permissions:
  contents: read
  actions: write # Required to trigger and inspect workflows

jobs:
  check-and-retrigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check last blog automation run
        id: check_run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Fetching last SCHEDULED run info for blog-automation.yml..."

          LAST_RUN_JSON=$(gh run list \
            --repo ${{ github.repository }} \
            --workflow=blog-automation.yml \
            --event schedule \
            --limit=1 \
            --json updatedAt,status,conclusion,databaseId)

          echo "Last scheduled run data: $LAST_RUN_JSON"

          LAST_UPDATED=$(echo "$LAST_RUN_JSON" | python3 -c "import json,sys; runs=json.load(sys.stdin); print(runs[0]['updatedAt']) if runs else print('')")
          LAST_STATUS=$(echo "$LAST_RUN_JSON"  | python3 -c "import json,sys; runs=json.load(sys.stdin); print(runs[0]['status']) if runs else print('unknown')")
          LAST_CONCLUSION=$(echo "$LAST_RUN_JSON" | python3 -c "import json,sys; runs=json.load(sys.stdin); print(runs[0]['conclusion']) if runs else print('unknown')")
          LAST_RUN_ID=$(echo "$LAST_RUN_JSON" | python3 -c "import json,sys; runs=json.load(sys.stdin); print(runs[0]['databaseId']) if runs else print('')")

          echo "Last updated : $LAST_UPDATED"
          echo "Last status  : $LAST_STATUS"
          echo "Last conclusion: $LAST_CONCLUSION"
          echo "Last run ID  : $LAST_RUN_ID"

          echo "last_updated=$LAST_UPDATED"       >> $GITHUB_OUTPUT
          echo "last_status=$LAST_STATUS"         >> $GITHUB_OUTPUT
          echo "last_conclusion=$LAST_CONCLUSION" >> $GITHUB_OUTPUT
          echo "last_run_id=$LAST_RUN_ID"         >> $GITHUB_OUTPUT

      - name: Calculate staleness
        id: staleness
        run: |
          LAST_UPDATED="${{ steps.check_run.outputs.last_updated }}"
          LAST_STATUS="${{ steps.check_run.outputs.last_status }}"

          if [ -z "$LAST_UPDATED" ]; then
            echo "No previous runs found. Marking as stale."
            echo "is_stale=true"  >> $GITHUB_OUTPUT
            echo "age_minutes=-1" >> $GITHUB_OUTPUT
            exit 0
          fi

          NOW=$(date +%s)
          LAST=$(date -d "$LAST_UPDATED" +%s 2>/dev/null || date -j -f "%Y-%m-%dT%H:%M:%SZ" "$LAST_UPDATED" +%s 2>/dev/null)
          DIFF=$(( (NOW - LAST) / 60 ))

          echo "Last run was $DIFF minutes ago (status: $LAST_STATUS)"
          echo "age_minutes=$DIFF" >> $GITHUB_OUTPUT

          # Flag as stale if:
          # - Last run completed more than 55 minutes ago, OR
          # - Last run has been in_progress for more than 25 minutes (likely hung)
          IS_STALE="false"

          if [ "$DIFF" -gt 55 ]; then
            echo "STALE: Last completed run is $DIFF minutes old (threshold: 55 min)"
            IS_STALE="true"
          elif [ "$LAST_STATUS" = "in_progress" ] && [ "$DIFF" -gt 25 ]; then
            echo "STALE: Run has been in_progress for $DIFF minutes — likely hung"
            IS_STALE="true"
          else
            echo "OK: Run is recent enough, no action needed."
          fi

          echo "is_stale=$IS_STALE" >> $GITHUB_OUTPUT

      - name: Cancel hung run if needed
        if: |
          steps.staleness.outputs.is_stale == 'true' &&
          steps.check_run.outputs.last_status == 'in_progress'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID="${{ steps.check_run.outputs.last_run_id }}"
          echo "Cancelling hung run ID: $RUN_ID"
          gh run cancel "$RUN_ID" --repo ${{ github.repository }} || echo "Cancel failed or run already finished."
          sleep 10

      - name: Re-trigger blog automation
        if: steps.staleness.outputs.is_stale == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Triggering blog-automation.yml..."
          gh workflow run blog-automation.yml \
            --repo ${{ github.repository }} \
            --ref main
          echo "SUCCESS: blog-automation.yml has been triggered."

      - name: Watchdog Summary
        if: always()
        run: |
          echo "## Watchdog Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Last Run Status | ${{ steps.check_run.outputs.last_status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Last Conclusion | ${{ steps.check_run.outputs.last_conclusion }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Age (minutes)   | ${{ steps.staleness.outputs.age_minutes }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Was Stale       | ${{ steps.staleness.outputs.is_stale }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Checked At      | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.staleness.outputs.is_stale }}" = "true" ]; then
            echo "⚠️ **Action Taken**: Blog automation was stale and has been re-triggered." >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ **No Action Needed**: Blog automation is running on schedule." >> $GITHUB_STEP_SUMMARY
          fi
