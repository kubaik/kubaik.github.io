      #   id: rebuild
      #   if: >
      #     steps.fallback_check.outputs.has_fallback == 'true' ||
      #     steps.similar_check.outputs.has_similar == 'true' ||
      #     steps.dedup_check.outputs.has_duplicates == 'true' ||
      #     steps.audit.outputs.has_audit_issues == 'true'
      #   run: |
      #     echo "Modifications occurred — rebuilding site..."
      #     python blog_system.py build

      - name: Master Commit and Push with Safe Engine Retry Loop
        id: commit_push
        if: >
          steps.fallback_check.outputs.has_fallback == 'true' ||
          steps.similar_check.outputs.has_similar == 'true' ||
          steps.dedup_check.outputs.has_duplicates == 'true' ||
          steps.audit.outputs.has_audit_issues == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add docs/

          if git diff --cached --quiet; then
            echo "No real changes to commit."
            echo "changes_committed=false" >> $GITHUB_OUTPUT
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            SUMMARY=""
            if [ "${{ steps.fallback_check.outputs.has_fallback }}" = "true" ]; then SUMMARY="${SUMMARY}fallback-posts "; fi
            if [ "${{ steps.similar_check.outputs.has_similar }}" = "true" ]; then SUMMARY="${SUMMARY}similar-posts "; fi
            if [ "${{ steps.dedup_check.outputs.has_duplicates }}" = "true" ]; then SUMMARY="${SUMMARY}duplicate-posts "; fi
            if [ "${{ steps.audit.outputs.has_audit_issues }}" = "true" ]; then SUMMARY="${SUMMARY}purged-posts "; fi

            git commit -m "chore: watchdog cleanup + rebuild [${TIMESTAMP}] (${SUMMARY% })"

            # Battle-tested engine retry loop
            MAX_ATTEMPTS=3
            ATTEMPT=1
            SUCCESS=false

            while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
              echo "Push attempt $ATTEMPT of $MAX_ATTEMPTS..."
              if git push origin main; then
                echo "Push successful!"
                SUCCESS=true
                break
              else
                echo "Collision detected! Remote moved ahead. Fetching latest state and re-running scripts..."
                git fetch origin main
                # Use rebase instead of hard reset to preserve our changes where possible;
                # accept theirs on any conflict to avoid getting stuck
                if ! git rebase origin/main; then
                  git checkout --theirs .
                  git add -A
                  git rebase --continue || git rebase --skip
                fi

                # Re-execute targeted scripts on top of pristine upstream state
                if [ "${{ steps.fallback_check.outputs.has_fallback }}" = "true" ]; then
                  echo "yes" | python utils/delete_fallback_posts.py --delete
                fi
                if [ "${{ steps.similar_check.outputs.has_similar }}" = "true" ]; then
                  echo "yes" | python utils/delete_similar_posts.py --delete --threshold 0.75
                fi
                if [ "${{ steps.dedup_check.outputs.has_duplicates }}" = "true" ]; then
                  python utils/deduplicate_posts.py --delete --no-rebuild
                fi
                # ── DISABLED: blog_system.py purge (audit-related re-run) ──────
                # if [ "${{ steps.audit.outputs.has_audit_issues }}" = "true" ]; then
                #   python blog_system.py purge
                # fi

                # Re-regenerate sitemap.xml too, since the deletions above were
                # just re-run on top of the freshly rebased state.
                if [ "${{ steps.fallback_check.outputs.has_fallback }}" = "true" ] || \
                   [ "${{ steps.similar_check.outputs.has_similar }}" = "true" ] || \
                   [ "${{ steps.dedup_check.outputs.has_duplicates }}" = "true" ]; then
                  python scripts/generate_sitemap.py --output-dir docs --base-url https://kubaik.github.io
                fi

                # ── DISABLED: blog_system.py build (recompile re-run) ───────────
                # Recompile fresh assets on top of updated branch head
                # python blog_system.py build

                git add docs/
                git commit -m "chore: watchdog cleanup + rebuild [${TIMESTAMP}] (${SUMMARY% })" || true
              fi
              ATTEMPT=$((ATTEMPT + 1))
            done

            if [ "$SUCCESS" = "false" ]; then
              # Emit a warning annotation rather than failing the job hard,
              # so the summary step always renders and the concurrency group
              # is not left blocked by a failed run.
              echo "::warning::Failed to push cleanly after $MAX_ATTEMPTS attempts — manual check needed."
            fi

            echo "changes_committed=true" >> $GITHUB_OUTPUT
          fi

      - name: Setup GitHub Pages
        if: steps.commit_push.outputs.changes_committed == 'true'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: steps.commit_push.outputs.changes_committed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: Deploy to GitHub Pages
        if: steps.commit_push.outputs.changes_committed == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Deployment Status
        if: steps.commit_push.outputs.changes_committed == 'true'
        run: |
          if [ "${{ steps.deployment.outcome }}" == "success" ]; then
            echo "✅ Watchdog redeploy successful — cleanup changes are now live"
          else
            echo "⚠️ Watchdog redeploy step had issues (may be transient)"
            echo "Check the Environments tab or re-run the workflow"
          fi

      # ── MISSING-SLOT RECOVERY ─────────────────────────────────────────────────
      # DISABLED PER USER REQUEST: the watchdog must never trigger
