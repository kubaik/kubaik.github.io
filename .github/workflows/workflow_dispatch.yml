name: Watchdog - Blog Automation Monitor

on:
  schedule:
    # Run 10 minutes after each blog cron slot to verify it fired
    # Blog slots: 05, 07, 09, 12, 15, 18 UTC
    - cron: "10 5  * * *"
    - cron: "10 7  * * *"
    - cron: "10 9  * * *"
    - cron: "10 12 * * *"
    - cron: "10 15 * * *"
    - cron: "10 18 * * *"
    # Catch-all hourly sweep to recover any missed slots
    - cron: "30 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  check-and-retrigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Determine which cron slots have passed today
        id: slots
        run: |
          CURRENT_HOUR=$(date -u +%-H)
          CURRENT_MINUTE=$(date -u +%-M)
          CURRENT_DATE=$(date -u +%Y-%m-%d)

          # All 6 scheduled blog cron hours (UTC)
          ALL_SLOTS=(5 7 9 12 15 18)

          PASSED_SLOTS=()
          for SLOT in "${ALL_SLOTS[@]}"; do
            # A slot is "due" if its hour has fully passed, or if we're ≥5 min into it
            if [ "$CURRENT_HOUR" -gt "$SLOT" ] || \
               ([ "$CURRENT_HOUR" -eq "$SLOT" ] && [ "$CURRENT_MINUTE" -ge 5 ]); then
              PASSED_SLOTS+=("$SLOT")
            fi
          done

          echo "Current UTC time  : $(date -u '+%H:%M')"
          echo "Passed slots today: ${PASSED_SLOTS[*]}"

          # Serialise as space-separated string for next step
          echo "passed_slots=${PASSED_SLOTS[*]}" >> $GITHUB_OUTPUT
          echo "current_date=$CURRENT_DATE"       >> $GITHUB_OUTPUT

      - name: Fetch today's completed scheduled runs
        id: fetch_runs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TODAY="${{ steps.slots.outputs.current_date }}"

          # Fetch last 50 scheduled runs (enough to cover a full day + buffer)
          RUN_JSON=$(gh run list \
            --repo ${{ github.repository }} \
            --workflow=blog-automation.yml \
            --event schedule \
            --limit 50 \
            --json databaseId,status,conclusion,createdAt)

          echo "Raw run data:"
          echo "$RUN_JSON" | python3 -c "
          import json, sys
          runs = json.load(sys.stdin)
          for r in runs[:10]:
              print(f\"  [{r['createdAt']}] {r['status']}/{r['conclusion']} id={r['databaseId']}\")
          "

          # Extract the hours (UTC) of runs that started today and didn't fail badly
          COVERED_HOURS=$(echo "$RUN_JSON" | python3 -c "
          import json, sys
          from datetime import datetime, timezone

          today = '$TODAY'
          runs = json.load(sys.stdin)
          hours = set()

          for r in runs:
              created = r['createdAt']                          # e.g. '2025-05-05T07:02:41Z'
              dt = datetime.fromisoformat(created.replace('Z', '+00:00'))
              if dt.strftime('%Y-%m-%d') != today:
                  continue
              # Ignore runs that were cancelled before doing any real work
              if r['conclusion'] in ('cancelled',):
                  continue
              hours.add(str(dt.hour))

          print(' '.join(sorted(hours, key=int)))
          ")

          echo "Hours with runs today: $COVERED_HOURS"
          echo "covered_hours=$COVERED_HOURS" >> $GITHUB_OUTPUT
          echo "run_json_b64=$(echo "$RUN_JSON" | base64 -w 0)" >> $GITHUB_OUTPUT

      - name: Detect missing slots and cancel any hung run
        id: missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PASSED_SLOTS="${{ steps.slots.outputs.passed_slots }}"
          COVERED_HOURS="${{ steps.fetch_runs.outputs.covered_hours }}"

          MISSING_SLOTS=()
          for SLOT in $PASSED_SLOTS; do
            FOUND=false
            for COVERED in $COVERED_HOURS; do
              if [ "$SLOT" -eq "$COVERED" ]; then
                FOUND=true
                break
              fi
            done
            if [ "$FOUND" = "false" ]; then
              MISSING_SLOTS+=("$SLOT")
              echo "MISSING slot: ${SLOT}:00 UTC"
            else
              echo "OK       slot: ${SLOT}:00 UTC"
            fi
          done

          if [ ${#MISSING_SLOTS[@]} -eq 0 ]; then
            echo "All passed slots are covered — no action needed."
            echo "has_missing=false" >> $GITHUB_OUTPUT
          else
            echo "Missing slots: ${MISSING_SLOTS[*]}"
            echo "has_missing=true"                    >> $GITHUB_OUTPUT
            echo "missing_list=${MISSING_SLOTS[*]}"    >> $GITHUB_OUTPUT
          fi

          # Cancel any currently hung in-progress run (>25 min old)
          RUN_JSON=$(echo "${{ steps.fetch_runs.outputs.run_json_b64 }}" | base64 -d)
          HUNG_ID=$(echo "$RUN_JSON" | python3 -c "
          import json, sys
          from datetime import datetime, timezone

          runs = json.load(sys.stdin)
          now = datetime.now(timezone.utc)

          for r in runs:
              if r['status'] != 'in_progress':
                  continue
              dt = datetime.fromisoformat(r['createdAt'].replace('Z', '+00:00'))
              age = (now - dt).total_seconds() / 60
              if age > 25:
                  print(r['databaseId'])
                  break
          ")

          if [ -n "$HUNG_ID" ]; then
            echo "Cancelling hung run $HUNG_ID..."
            gh run cancel "$HUNG_ID" --repo ${{ github.repository }} || true
            sleep 10
          fi

      - name: Trigger blog automation for each missing slot
        if: steps.missing.outputs.has_missing == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MISSING="${{ steps.missing.outputs.missing_list }}"
          COUNT=0

          for SLOT in $MISSING; do
            echo "Triggering for missed slot ${SLOT}:00 UTC..."
            gh workflow run blog-automation.yml \
              --repo ${{ github.repository }} \
              --ref main
            COUNT=$((COUNT + 1))

            # Brief pause between triggers to avoid race conditions
            if [ -n "$(echo $MISSING | grep -o ' ')" ]; then
              sleep 15
            fi
          done

          echo "Triggered $COUNT run(s) for missed slots: $MISSING"

      - name: Watchdog Summary
        if: always()
        run: |
          {
            echo "## Watchdog Report — $(date -u '+%Y-%m-%d %H:%M UTC')"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Passed slots today | ${{ steps.slots.outputs.passed_slots }} |"
            echo "| Covered hours | ${{ steps.fetch_runs.outputs.covered_hours }} |"
            echo "| Missing slots | ${{ steps.missing.outputs.missing_list || 'none' }} |"
            echo "| Action taken | ${{ steps.missing.outputs.has_missing == 'true' && 'Re-triggered missing slots' || 'None — all slots covered' }} |"
            echo ""
            if [ "${{ steps.missing.outputs.has_missing }}" = "true" ]; then
              echo "**Missing slots detected and re-triggered:** ${{ steps.missing.outputs.missing_list }}"
            else
              echo "**All cron slots are running on schedule.**"
            fi
          } >> $GITHUB_STEP_SUMMARY
