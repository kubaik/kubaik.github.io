      - name: Watchdog Summary
        if: always()
        run: |
          {
            echo "## Watchdog Report — $(date -u '+%Y-%m-%d %H:%M UTC')"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Passed 2-hour slots today | \`${{ steps.slots.outputs.passed_slots }}\` |"
            echo "| Covered hours (all events) | \`${{ steps.fetch_runs.outputs.covered_hours }}\` |"
            echo "| Missing slots (auto-trigger disabled) | \`${{ steps.missing.outputs.missing_list || 'none' }}\` |"
            echo "| Fallback posts found | \`${{ steps.fallback_check.outputs.has_fallback == 'true' && 'yes — deleted ⚠️' || 'none ✅' }}\` |"
            echo "| Similar posts found  | \`${{ steps.similar_check.outputs.has_similar == 'true' && 'yes — deleted ⚠️' || 'none ✅' }}\` |"
            echo "| Duplicate posts found | \`${{ steps.dedup_check.outputs.has_duplicates == 'true' && 'yes — deleted ⚠️' || 'none ✅' }}\` |"
            echo "| Audit issues found    | \`${{ steps.audit.outputs.has_audit_issues == 'true' && 'yes — purged ⚠️' || 'none ✅' }}\` |"
            echo "| Sitemap regenerated   | \`${{ (steps.fallback_check.outputs.has_fallback == 'true' || steps.similar_check.outputs.has_similar == 'true' || steps.dedup_check.outputs.has_duplicates == 'true') && 'yes ✅' || 'not needed' }}\` |"
            echo "| Pages redeployed      | \`${{ steps.commit_push.outputs.changes_committed == 'true' && (steps.deployment.outcome == 'success' && 'yes ✅' || 'attempted ⚠️') || 'not needed' }}\` |"
            echo ""
            if [ -n "${{ steps.missing.outputs.missing_list }}" ]; then
              echo "ℹ️ **Missing slots detected but no catch-up run was triggered (auto-trigger disabled):** \`${{ steps.missing.outputs.missing_list }}\`"
            else
              echo "✅ **All cron slots running on schedule.**"
            fi
          } >> $GITHUB_STEP_SUMMARY
