name: Watchdog - Blog Automation Monitor

on:
  schedule:
    - cron: "15 * * * *"
    - cron: "30 * * * *"
    - cron: "45 * * * *"
  workflow_dispatch:

permissions:
  contents: write # upgraded from 'read' — needed for checkout + git push after dedup
  actions: write

jobs:
  check-and-retrigger:
    runs-on: ubuntu-latest
    timeout-minutes: 10 # bumped from 5 — dedup + site rebuild can take a few minutes

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so git operations work correctly

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: |
          pip install --quiet pyyaml aiohttp requests
          # Install any other deps your deduplicate_posts.py / blog_system.py need.
          # Add lines here if requirements.txt exists:
          # pip install --quiet -r requirements.txt

      - name: Determine which cron slots have passed today
        id: slots
        run: |
          CURRENT_HOUR=$(date -u +%-H)
          CURRENT_MINUTE=$(date -u +%-M)
          CURRENT_DATE=$(date -u +%Y-%m-%d)

          ALL_SLOTS=(5 7 9 12 15 18)
          PASSED_SLOTS=()
          for SLOT in "${ALL_SLOTS[@]}"; do
            if [ "$CURRENT_HOUR" -gt "$SLOT" ] || \
               ([ "$CURRENT_HOUR" -eq "$SLOT" ] && [ "$CURRENT_MINUTE" -ge 5 ]); then
              PASSED_SLOTS+=("$SLOT")
            fi
          done

          echo "Current UTC time  : $(date -u '+%H:%M')"
          echo "Passed slots today: ${PASSED_SLOTS[*]}"
          echo "passed_slots=${PASSED_SLOTS[*]}" >> $GITHUB_OUTPUT
          echo "current_date=$CURRENT_DATE"       >> $GITHUB_OUTPUT

      - name: Fetch today's blog automation runs (all events)
        id: fetch_runs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TODAY="${{ steps.slots.outputs.current_date }}"

          SCHEDULE_JSON=$(gh run list \
            --repo ${{ github.repository }} \
            --workflow=blog-automation.yml \
            --event schedule \
            --limit 30 \
            --json databaseId,status,conclusion,createdAt,event)

          DISPATCH_JSON=$(gh run list \
            --repo ${{ github.repository }} \
            --workflow=blog-automation.yml \
            --event workflow_dispatch \
            --limit 30 \
            --json databaseId,status,conclusion,createdAt,event)

          # Merge both lists
          ALL_RUNS=$(python3 -c "
          import json, sys
          s = json.loads('''$SCHEDULE_JSON''')
          d = json.loads('''$DISPATCH_JSON''')
          merged = s + d
          print(json.dumps(merged))
          ")

          echo "Combined run count: $(echo "$ALL_RUNS" | python3 -c "import json,sys; print(len(json.load(sys.stdin)))")"

          COVERED_HOURS=$(echo "$ALL_RUNS" | python3 -c "
          import json, sys
          from datetime import datetime, timezone

          today = '$TODAY'
          runs = json.load(sys.stdin)
          hours = set()

          ACTIVE_STATUSES = {'completed', 'in_progress', 'queued', 'waiting', 'requested'}

          for r in runs:
              created = r['createdAt']
              dt = datetime.fromisoformat(created.replace('Z', '+00:00'))
              if dt.strftime('%Y-%m-%d') != today:
                  continue
              if r.get('conclusion') == 'cancelled' and r.get('status') == 'completed':
                  continue
              if r.get('status') in ACTIVE_STATUSES or r.get('conclusion') in ('success', 'failure', 'timed_out'):
                  hours.add(str(dt.hour))

          print(' '.join(sorted(hours, key=int)))
          ")

          echo "Hours with runs today (all events): $COVERED_HOURS"
          echo "covered_hours=$COVERED_HOURS" >> $GITHUB_OUTPUT

          # Store merged JSON (base64) for hung-run detection below
          echo "all_runs_b64=$(echo "$ALL_RUNS" | base64 -w 0)" >> $GITHUB_OUTPUT

      - name: Detect missing slots and cancel any hung run
        id: missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PASSED_SLOTS="${{ steps.slots.outputs.passed_slots }}"
          COVERED_HOURS="${{ steps.fetch_runs.outputs.covered_hours }}"

          MISSING_SLOTS=()
          for SLOT in $PASSED_SLOTS; do
            FOUND=false
            for COVERED in $COVERED_HOURS; do
              if [ "$SLOT" -eq "$COVERED" ]; then
                FOUND=true
                break
              fi
            done
            if [ "$FOUND" = "false" ]; then
              MISSING_SLOTS+=("$SLOT")
              echo "MISSING slot: ${SLOT}:00 UTC"
            else
              echo "OK       slot: ${SLOT}:00 UTC"
            fi
          done

          if [ ${#MISSING_SLOTS[@]} -eq 0 ]; then
            echo "All passed slots are covered — no action needed."
            echo "has_missing=false" >> $GITHUB_OUTPUT
          else
            echo "Missing slots: ${MISSING_SLOTS[*]}"
            echo "has_missing=true"                 >> $GITHUB_OUTPUT
            echo "missing_list=${MISSING_SLOTS[*]}" >> $GITHUB_OUTPUT
          fi

          # Cancel any hung in-progress run (>25 min old)
          ALL_RUNS=$(echo "${{ steps.fetch_runs.outputs.all_runs_b64 }}" | base64 -d)
          HUNG_ID=$(echo "$ALL_RUNS" | python3 -c "
          import json, sys
          from datetime import datetime, timezone

          runs = json.load(sys.stdin)
          now = datetime.now(timezone.utc)

          for r in runs:
              if r.get('status') != 'in_progress':
                  continue
              dt = datetime.fromisoformat(r['createdAt'].replace('Z', '+00:00'))
              age = (now - dt).total_seconds() / 60
              if age > 25:
                  print(r['databaseId'])
                  break
          ")

          if [ -n "$HUNG_ID" ]; then
            echo "Cancelling hung run $HUNG_ID..."
            gh run cancel "$HUNG_ID" --repo ${{ github.repository }} || true
            sleep 10
          fi

      # ── DEDUPLICATION ────────────────────────────────────────────────────────
      # Runs on every watchdog execution (independent of the missing-slot logic).
      # Step 1: dry-run to detect duplicates and capture the exit signal.
      # Step 2: delete only when duplicates were actually found.
      # Step 3: commit + push the cleaned docs/ tree so the deletion persists.

      - name: Deduplication dry-run (detect duplicates)
        id: dedup_check
        run: |
          echo "Running deduplication dry-run..."

          # Capture full output; the script exits 0 whether or not dupes exist.
          OUTPUT=$(python deduplicate_posts.py 2>&1)
          echo "$OUTPUT"

          # The script prints "No duplicate posts found." when clean.
          if echo "$OUTPUT" | grep -q "No duplicate posts found."; then
            echo "has_duplicates=false" >> $GITHUB_OUTPUT
            echo "✅ No duplicates detected."
          else
            # Verify there really is at least one duplicate pair line before flagging.
            if echo "$OUTPUT" | grep -q "Similarity"; then
              echo "has_duplicates=true" >> $GITHUB_OUTPUT
              echo "⚠️ Duplicates detected — will delete in next step."
            else
              # Output was unexpected — treat as clean to avoid accidental mass-deletes.
              echo "has_duplicates=false" >> $GITHUB_OUTPUT
              echo "⚠️ Unexpected dedup output — defaulting to no-delete (review logs above)."
            fi
          fi

      - name: Deduplication delete (remove duplicate posts)
        id: dedup_delete
        if: steps.dedup_check.outputs.has_duplicates == 'true'
        run: |
          echo "Duplicates confirmed. Running deletion pass..."
          # --no-rebuild: we commit the raw docs/ changes; the blog-automation
          # workflow (or a manual build) will regenerate HTML as normal.
          # If you want the HTML rebuilt immediately here too, remove --no-rebuild.
          python deduplicate_posts.py --delete --no-rebuild
          echo "Deletion complete."

      - name: Commit and push deduplicated posts
        if: steps.dedup_check.outputs.has_duplicates == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage only the docs/ directory — don't accidentally commit other changes.
          git add docs/

          # Nothing to commit if the delete step somehow produced no diff.
          if git diff --cached --quiet; then
            echo "No changes to commit (docs/ unchanged after dedup)."
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "chore: remove duplicate blog posts [watchdog ${TIMESTAMP}]"
            git push
            echo "Pushed deduplicated docs/ to main."
          fi

      # ── MISSING-SLOT RECOVERY (unchanged logic) ──────────────────────────────

      - name: Safety pause before triggering
        if: steps.missing.outputs.has_missing == 'true'
        run: |
          echo "Waiting 90s to let any queued runs start before we fire..."
          sleep 90

      - name: Re-verify missing slots after pause
        if: steps.missing.outputs.has_missing == 'true'
        id: reverify
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TODAY="${{ steps.slots.outputs.current_date }}"
          MISSING_IN="${{ steps.missing.outputs.missing_list }}"

          SCHEDULE_JSON=$(gh run list \
            --repo ${{ github.repository }} \
            --workflow=blog-automation.yml \
            --event schedule \
            --limit 30 \
            --json databaseId,status,conclusion,createdAt,event)

          DISPATCH_JSON=$(gh run list \
            --repo ${{ github.repository }} \
            --workflow=blog-automation.yml \
            --event workflow_dispatch \
            --limit 30 \
            --json databaseId,status,conclusion,createdAt,event)

          ALL_RUNS=$(python3 -c "
          import json
          s = json.loads('''$SCHEDULE_JSON''')
          d = json.loads('''$DISPATCH_JSON''')
          print(json.dumps(s + d))
          ")

          STILL_MISSING=$(echo "$ALL_RUNS" | python3 -c "
          import json, sys
          from datetime import datetime, timezone

          today = '$TODAY'
          missing_slots = [int(x) for x in '$MISSING_IN'.split() if x]
          runs = json.load(sys.stdin)

          covered = set()
          ACTIVE = {'completed', 'in_progress', 'queued', 'waiting', 'requested'}
          for r in runs:
              dt = datetime.fromisoformat(r['createdAt'].replace('Z', '+00:00'))
              if dt.strftime('%Y-%m-%d') != today:
                  continue
              if r.get('conclusion') == 'cancelled' and r.get('status') == 'completed':
                  continue
              if r.get('status') in ACTIVE or r.get('conclusion') in ('success', 'failure', 'timed_out'):
                  covered.add(dt.hour)

          still_missing = [s for s in missing_slots if s not in covered]
          print(' '.join(str(s) for s in still_missing))
          ")

          echo "Still missing after pause: '${STILL_MISSING}'"
          if [ -z "$STILL_MISSING" ]; then
            echo "confirmed_missing=false" >> $GITHUB_OUTPUT
          else
            echo "confirmed_missing=true"           >> $GITHUB_OUTPUT
            echo "confirmed_list=$STILL_MISSING"    >> $GITHUB_OUTPUT
          fi

      - name: Trigger blog automation for missing slots
        if: >
          steps.missing.outputs.has_missing == 'true' &&
          steps.reverify.outputs.confirmed_missing == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MISSING="${{ steps.reverify.outputs.confirmed_list }}"
          echo "Confirmed missing slots after re-verify: $MISSING"
          echo "Triggering ONE catch-up run (concurrency group will serialize the rest)..."

          gh workflow run blog-automation.yml \
            --repo ${{ github.repository }} \
            --ref main

          echo "Triggered 1 catch-up run for missed slots: $MISSING"

      - name: Watchdog Summary
        if: always()
        run: |
          {
            echo "## Watchdog Report — $(date -u '+%Y-%m-%d %H:%M UTC')"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Passed slots today | \`${{ steps.slots.outputs.passed_slots }}\` |"
            echo "| Covered hours (all events) | \`${{ steps.fetch_runs.outputs.covered_hours }}\` |"
            echo "| Initially missing | \`${{ steps.missing.outputs.missing_list || 'none' }}\` |"
            echo "| Still missing after re-verify | \`${{ steps.reverify.outputs.confirmed_list || 'none' }}\` |"
            echo "| Action | ${{ steps.reverify.outputs.confirmed_missing == 'true' && 'Re-triggered ⚠️' || 'No action needed ✅' }} |"
            echo "| Duplicates found | \`${{ steps.dedup_check.outputs.has_duplicates == 'true' && 'yes — deleted ⚠️' || 'none ✅' }}\` |"
            echo ""
            if [ "${{ steps.reverify.outputs.confirmed_missing }}" = "true" ]; then
              echo "⚠️ **Triggered catch-up run for missed slots:** \`${{ steps.reverify.outputs.confirmed_list }}\`"
            else
              echo "✅ **All cron slots running on schedule.**"
            fi
            if [ "${{ steps.dedup_check.outputs.has_duplicates }}" = "true" ]; then
              echo ""
              echo "⚠️ **Duplicate posts were detected and deleted. docs/ has been pushed.**"
            else
              echo ""
              echo "✅ **No duplicate posts found.**"
            fi
          } >> $GITHUB_STEP_SUMMARY
