<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <linearGradient id="stripe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#stripe)"/>

  <!-- Decorative circles -->
  <circle cx="1050" cy="100" r="200" fill="rgba(255,255,255,0.07)"/>
  <circle cx="150" cy="530" r="150" fill="rgba(255,255,255,0.05)"/>

  <!-- Content area -->
  <rect x="60" y="60" width="1080" height="510" rx="16"
        fill="rgba(0,0,0,0.25)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <!-- Site name -->
  <text x="100" y="135"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="26" font-weight="600"
        fill="rgba(255,255,255,0.85)"
        letter-spacing="1">
    Kubai Kevin
  </text>

  <!-- Separator -->
  <rect x="100" y="155" width="60" height="4" rx="2" fill="rgba(255,255,255,0.6)"/>

  <!-- Post title — wrapped across up to 3 lines -->
  <text x="100" y="230" font-family="system-ui,-apple-system,sans-serif" font-size="48" font-weight="700" fill="white">Postgres 17 swallowed Redis, Kafka,</text>
  <text x="100" y="292" font-family="system-ui,-apple-system,sans-serif" font-size="48" font-weight="700" fill="white">Timescale</text>

  <!-- Tag pills -->
  <rect x="100" y="470" width="193" height="34" rx="17" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
  <text x="114" y="492" font-family="system-ui,-apple-system,sans-serif" font-size="16" fill="rgba(255,255,255,0.9)">PostgresVsRedis</text>
  <rect x="305" y="470" width="226" height="34" rx="17" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
  <text x="319" y="492" font-family="system-ui,-apple-system,sans-serif" font-size="16" fill="rgba(255,255,255,0.9)">Postgres17Features</text>
  <rect x="543" y="470" width="83" height="34" rx="17" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
  <text x="557" y="492" font-family="system-ui,-apple-system,sans-serif" font-size="16" fill="rgba(255,255,255,0.9)">Kafka</text>
  <rect x="638" y="470" width="149" height="34" rx="17" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
  <text x="652" y="492" font-family="system-ui,-apple-system,sans-serif" font-size="16" fill="rgba(255,255,255,0.9)">Timescaledb</text>

  <!-- Author -->
  <text x="100" y="560"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="22" fill="rgba(255,255,255,0.75)">
    by Kubai Kevin
  </text>
</svg>